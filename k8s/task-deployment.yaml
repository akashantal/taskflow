apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
  namespace: taskflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-service
  template:
    metadata:
      labels:
        app: task-service
    spec:
      containers:
        - name: task-service
          image: taskflow-task:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8002
          env:
            - name: DATABASE_URL
              value: postgresql://taskuser:taskpass@postgres:5432/taskflow
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: task-service
  namespace: taskflow
spec:
  selector:
    app: task-service
  ports:
    - port: 8002
      targetPort: 8002
