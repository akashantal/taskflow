apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: taskflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: taskflow-user:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
          env:
            - name: DATABASE_URL
              value: postgresql://taskuser:taskpass@postgres:5432/taskflow
            - name: SECRET_KEY
              value: supersecretkey123
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: taskflow
spec:
  selector:
    app: user-service
  ports:
    - port: 8001
      targetPort: 8001
