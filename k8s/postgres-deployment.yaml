apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: taskflow
type: Opaque
stringData:
  POSTGRES_USER: taskuser
  POSTGRES_PASSWORD: taskpass
  POSTGRES_DB: taskflow
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: taskflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "taskuser", "-d", "taskflow"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: taskflow
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
