apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: taskflow-monitor
  namespace: monitoring
  labels:
    release: prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - taskflow
  selector:
    matchLabels: {}
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
