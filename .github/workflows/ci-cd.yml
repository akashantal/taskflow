name: TaskFlow CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Test User Service
        working-directory: ./user-service
        run: |
          pip install fastapi uvicorn python-jose passlib bcrypt python-dotenv sqlalchemy psycopg2-binary
          python -c "from main import app; print('user-service import OK')"

      - name: Test Task Service
        working-directory: ./task-service
        run: |
          pip install fastapi uvicorn python-dotenv sqlalchemy psycopg2-binary
          python -c "from main import app; print('task-service import OK')"

      - name: Test Notification Service
        working-directory: ./notification-service
        run: |
          pip install fastapi uvicorn python-dotenv
          python -c "from main import app; print('notification-service import OK')"

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-user:latest

      - name: Build and push task-service
        uses: docker/build-push-action@v5
        with:
          context: ./task-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-task:latest

      - name: Build and push notification-service
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-notify:latest

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy confirmation
        run: |
          echo "Images successfully built and pushed to Docker Hub"
          echo "user-service:   ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-user:latest"
          echo "task-service:   ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-task:latest"
          echo "notify-service: ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-notify:latest"
          echo "Ready for Kubernetes deployment!"
