name: TaskFlow CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: taskuser
          POSTGRES_PASSWORD: taskpass
          POSTGRES_DB: taskflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Test User Service
        working-directory: ./user-service
        env:
          DATABASE_URL: postgresql://taskuser:taskpass@localhost:5432/taskflow
          SECRET_KEY: supersecretkey123
        run: |
          pip install -r requirements.txt
          python -c "from main import app; print('user-service import OK')"

      - name: Test Task Service
        working-directory: ./task-service
        env:
          DATABASE_URL: postgresql://taskuser:taskpass@localhost:5432/taskflow
        run: |
          pip install -r requirements.txt
          python -c "from main import app; print('task-service import OK')"

      - name: Test Notification Service
        working-directory: ./notification-service
        run: |
          pip install -r requirements.txt
          python -c "from main import app; print('notification-service import OK')"

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-user:latest

      - name: Build and push task-service
        uses: docker/build-push-action@v5
        with:
          context: ./task-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-task:latest

      - name: Build and push notification-service
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-notify:latest

  deploy:
    name: Deploy Summary
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deployment summary
        run: |
          echo "========================================"
          echo "   TaskFlow Deployment Complete!"
          echo "========================================"
          echo "user-service:   ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-user:latest"
          echo "task-service:   ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-task:latest"
          echo "notify-service: ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-notify:latest"
          echo "========================================"
